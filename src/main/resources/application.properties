spring.application.name=api-gateway

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# Service URLs
user.microservice.url=${USER_MICROSERVICE_URL}
movie.service.url=${MOVIE_SERVICE_URL}
rating.service.url=${RATING_SERVICE_URL}
recommendation.service.url=${RECOMMENDATION_SERVICE_URL}

# Rate limiting configuration
rate.limit.login.capacity=${RATE_LIMIT_LOGIN_CAPACITY}
rate.limit.login.refill.tokens=${RATE_LIMIT_LOGIN_REFILL_TOKENS}
rate.limit.login.refill.minutes=${RATE_LIMIT_LOGIN_REFILL_MINUTES}

cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# Server overridden by application-secrets.properties for local dev
server.port=${SERVER_PORT}

# Import secrets
spring.config.import=optional:classpath:application-secrets.properties
