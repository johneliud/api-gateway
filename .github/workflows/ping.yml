name: Ping Service

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    env:
      URL_1: ${{ secrets.BUY01_BASE_URL }}
      URL_2: ${{ secrets.NEO4FLIX_BASE_URL }}

    steps:
      - name: Ping services
        run: |
          set -e

          FAILED=0

          for url in "$URL_1" "$URL_2"; do
            echo "Pinging service..."

            if ! curl -f -s -o /dev/null "https://$url/actuator/health"; then
              echo "Service is DOWN"
              FAILED=1
            else
              echo "Service is UP"
            fi
          done

          if [ "$FAILED" -ne 0 ]; then
            echo "One or more services are down"
            exit 1
          fi